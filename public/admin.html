<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Transfer</title>
<link rel="stylesheet" href="admin.css">
<script defer src="admin.js"></script>
</head>
<body>



<!-- =========================
 ADMIN TRANSFER SECTION
========================= -->

<div class="admin-box">

    <h2>Admin Transfer</h2>

    <div class="transfer-form">

        <input 
        type="email"
        placeholder="User Email" id="email"
        >

        <input 
        type="number" id="amount" 
        placeholder="Amount"
        >

        <button id="btn">
            Send Money
        </button>

    </div>
    </div>


    <!-- =========================
     PROFILE UPLOAD SECTION
    ========================= -->
<div class="admin-box">
    <div class="upload-section">

        <h2>Upload User Profile</h2>

        <form id="uploadForm">

            <input
            type="email"
            name="email"
            placeholder="User Email"
            required
            >

            <input
            type="file"
            name="image"
            required
            >

            <button>
                Upload Picture
            </button>

        </form>

    </div>
</div>


</body>
</html>
